plugins {
    id 'fabric-loom' version '1.4.+'
    id 'java'
}

version = "1.0.0"
group = "com.bloom.core"

repositories {
    maven { url = "https://repo.legacyfabric.net/repository/legacyfabric/" }
    mavenCentral()
}

loom {
    setIntermediaryUrl("https://meta.legacyfabric.net/v2/versions/intermediary/%1\$s/%1\$s-intermediary.jar")
}

dependencies {
    minecraft "com.mojang:minecraft:1.8.9"
    mappings "net.legacyfabric:yarn:1.8.9+build.604:v2"
    modImplementation "net.legacyfabric.legacy-fabric-api:legacy-fabric-api:1.10.2+1.8.9"
    modImplementation "net.fabricmc:fabric-loader:0.18.4"
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

tasks.withType(JavaCompile).configureEach {
    options.release = 21
}
